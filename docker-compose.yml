services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: printflow
      POSTGRES_PASSWORD: printflow
      POSTGRES_DB: printflow
    ports:
      - "55432:5432"
    volumes:
      - printflow_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U printflow -d printflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  db_test:
    image: postgres:16
    environment:
      POSTGRES_USER: printflow
      POSTGRES_PASSWORD: printflow
      POSTGRES_DB: printflow_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U printflow -d printflow_test"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  printflow_db_data:
